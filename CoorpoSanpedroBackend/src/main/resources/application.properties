spring.application.name=festival-bambuco

# Database Configuration (Local PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:festival_bambuco}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:quinteropo}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:super-secret-key-para-desarrollo-local-minimo-32-caracteres-jwt}
jwt.expiration-ms=28800000
jwt.refresh-expiration-ms=604800000

# Server
server.port=8080

# Logging
logging.level.com.festival=DEBUG
logging.level.org.springframework.security=INFO
