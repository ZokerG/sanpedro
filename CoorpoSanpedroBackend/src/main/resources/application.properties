spring.application.name=festival-bambuco

# Database Configuration (Local PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:festival_bambuco}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:quinteropo}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:super-secret-key-para-desarrollo-local-minimo-32-caracteres-jwt}
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# Propiedades que usa JwtService (namespace correcto)
application.security.jwt.secret-key=${JWT_SECRET:super-secret-key-para-desarrollo-local-minimo-32-caracteres-jwt}
application.security.jwt.expiration=86400000

# Server
server.port=8080

# Logging
logging.level.com.festival=DEBUG
logging.level.org.springframework.security=INFO

# S3 Configuration (MinIO local)
aws.s3.endpoint-url=http://localhost:9000
aws.s3.access-key=corpoadmin
aws.s3.secret-key=corpopassword
aws.s3.bucket-name=documentos-sanpedro
aws.s3.region=us-east-1

# Mail Configuration (OTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@corposanpedro.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
otp.expiration-minutes=5

# File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
